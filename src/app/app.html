<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background-color: #f4f6f8;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: 40px auto;
  background: white;
  padding: 20px 30px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
  margin-bottom: 20px;
}

.actions {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.actions input {
  width: 300px;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.actions button {
  background-color: #1976d2;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
}

.actions button:hover {
  background-color: #125aa0;
}

.table-container {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background-color: #1976d2;
  color: white;
}

th, td {
  padding: 10px;
  text-align: left;
}

tbody tr {
  border-bottom: 1px solid #eee;
}

tbody tr:hover {
  background-color: #f1f7ff;
}

.nome {
  font-weight: bold;
}

.empty {
  text-align: center;
  margin-top: 20px;
  color: #777;
}
</style>

<main class="main">
  <div class="container">

    <h1>📋 Gestão de Clientes</h1>

    <div class="actions">
      <button (click)="buscar()">Buscar clientes</button>

      <input 
        type="text" 
        placeholder="🔍 Buscar por nome, cidade ou estado..."
        [(ngModel)]="filtroNome"
        (input)="aplicarFiltro()"
      />
    </div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Endereço</th>
            <th>Bairro</th>
            <th>Cidade</th>
            <th>Estado</th>
            <th>CEP</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let cliente of clientesFiltrados">
            <td>{{ cliente.id }}</td>
            <td class="nome">{{ cliente.nome }}</td>
            <td>{{ cliente.endereco }}</td>
            <td>{{ cliente.bairro }}</td>
            <td>{{ cliente.cidade }}</td>
            <td>{{ cliente.estado }}</td>
            <td>{{ cliente.cep }}</td>
          </tr>
        </tbody>
      </table>

      <p *ngIf="clientesFiltrados.length === 0" class="empty">
        Nenhum cliente encontrado.
      </p>

      <p *ngIf="loading">Carregando clientes...</p>
    </div>

  </div>
</main>

<router-outlet />
